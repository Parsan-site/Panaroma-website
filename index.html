  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"2755a741-e3cf-4d34-95d7-8c1e442e3377\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"fdcaa036-1881-44e4-89bd-4f0fdf028872\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #FFF9E8;\n    --ink: #1E1C1D;\n    --muted: #7E7E7E;\n    --hairline: rgba(30, 28, 29, 0.14);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--bg);\n    color: var(--ink);\n    font-family: 'Montserrat', system-ui, -apple-system, Helvetica, Arial, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility;\n  }\n\n  body {\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n\n  /* svg circle scaling around own center */\n  svg .halftone circle {\n    transform-box: fill-box;\n    transform-origin: center;\n  }\n\n  /* ------------------------------------------------------------------ */\n  /* LOADER                                                             */\n  /* ------------------------------------------------------------------ */\n  #loader {\n    position: fixed;\n    inset: 0;\n    background: var(--ink);\n    z-index: 9999;\n    display: grid;\n    place-items: center;\n    transition: opacity 600ms ease-out;\n  }\n  #loader .loader-mark {\n    width: 240px;\n    height: 240px;\n    transition: transform 600ms cubic-bezier(.2,.7,.2,1), opacity 600ms ease-out;\n  }\n  #loader.exit .loader-mark {\n    transform: scale(6);\n    opacity: 0;\n  }\n  #loader.gone {\n    opacity: 0;\n    pointer-events: none;\n  }\n\n  /* dots animate in place — bounce (scale) + flicker (opacity) */\n  #loader .halftone circle {\n    animation:\n      bounce 1.4s cubic-bezier(.6,.05,.4,.95) infinite,\n      flicker 2.6s ease-in-out infinite;\n  }\n\n  @keyframes bounce {\n    0%, 100% { transform: scale(0.55); }\n    50%      { transform: scale(1.15); }\n  }\n  @keyframes flicker {\n    0%, 100% { opacity: 1; }\n    18%      { opacity: 0.25; }\n    32%      { opacity: 1; }\n    54%      { opacity: 0.45; }\n    71%      { opacity: 0.92; }\n    88%      { opacity: 0.35; }\n  }\n\n  /* ------------------------------------------------------------------ */\n  /* SHARED                                                             */\n  /* ------------------------------------------------------------------ */\n  .container {\n    width: 100%;\n    max-width: 1120px;\n    margin: 0 auto;\n    padding: 0 32px;\n    position: relative;\n    z-index: 1;\n  }\n\n  /* faint scattered logo watermark texture */\n  .tex {\n    position: absolute;\n    inset: 0;\n    overflow: hidden;\n    pointer-events: none;\n    z-index: 0;\n  }\n  .tex img {\n    position: absolute;\n    display: block;\n    width: 180px;\n    height: auto;\n    opacity: 0.09;\n    user-select: none;\n    -webkit-user-drag: none;\n  }\n\n  .fade-up {\n    opacity: 0;\n    transform: translateY(14px);\n    transition: opacity 800ms cubic-bezier(.2,.7,.2,1), transform 800ms cubic-bezier(.2,.7,.2,1);\n    will-change: opacity, transform;\n  }\n  .fade-up.in {\n    opacity: 1;\n    transform: translateY(0);\n  }\n\n  /* ------------------------------------------------------------------ */\n  /* MARKS / LOCKUPS dar<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================================================================== -->\n<!-- VALUE / 3 COLUMN                                                    -->\n<!-- =================================================================== -->\n<section class=\"value\" data-screen-label=\"03 Value\">\n  <div class=\"tex\" aria-hidden=\"true\">\n    <img src=\"4c80e3a1-2b6e-4245-aa84-b5e8783380e6\" style=\"top:-2%;left:70%;width:440px;opacity:.08;\">\n    <img src=\"4c80e3a1-2b6e-4245-aa84-b5e8783380e6\" style=\"top:60%;left:-6%;width:260px;opacity:.075;\">\n  <\u002Fdiv>\n  <div class=\"container\">\n    <div class=\"value-head fade-up\">\n      <span class=\"rule\" aria-hidden=\"true\" style=\"display:block;width:36px;height:2px;background:var(--ink);margin:0 auto 22px;\"><\u002Fspan>\n      <div class=\"eyebrow\" style=\"color: rgb(30, 28, 29); font-size: 60px; font-weight: 800; line-height: 1.05; letter-spacing: -0.7px; font-family: Montserrat;\">The Call<\u002Fdiv>\n      <h2 style=\"font-weight: 400; color: rgb(126, 126, 126); font-size: 20px; margin: 12px 0 0;\">What happens on the call<\u002Fh2>\n      <span class=\"rule\" aria-hidden=\"true\" style=\"display:block;width:36px;height:2px;background:var(--ink);margin:22px auto 0;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"value-grid\">\n      <div class=\"v-card fade-up\">\n        <div class=\"v-num\">1<\u002Fdiv>\n        <div class=\"pillar\">Review<\u002Fdiv>\n        <h3>We look at your current setup.<\u002Fh3>\n        <div class=\"rule\" aria-hidden=\"true\"><\u002Fdiv>\n        <p>Your ads, your funnel, and where leads are leaking. We find what's costing you bookings right now.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"v-card fade-up\">\n        <div class=\"v-num\">2<\u002Fdiv>\n        <div class=\"pillar\">Plan<\u002Fdiv>\n        <h3>We map your first 30 days.<\u002Fh3>\n        <div class=\"rule\" aria-hidden= class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-3\" aria-expanded=\"false\" aria-controls=\"faq-a-3\">\n          <span>Do I pay for the ads too?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-3\" role=\"region\" aria-labelledby=\"faq-q-3\">\n          <div class=\"faq-a-inner\">Yes, the ad budget is always yours and it goes directly to Meta. We never touch it or mark it up. You're paying Meta to show your ads, and paying us to make those ads actually work.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-4\" aria-expanded=\"false\" aria-controls=\"faq-a-4\">\n          <span>How many leads will I get?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-4\" role=\"region\" aria-labelledby=\"faq-q-4\">\n          <div class=\"faq-a-inner\">That depends on your budget, your market, and your offer, so anyone promising an exact number on day one is guessing. What we can promise is that every lead gets followed up the moment it comes in, so none slip through the cracks. That gap is where most businesses quietly lose money.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-5\" aria-expanded=\"false\" aria-controls=\"faq-a-5\">\n          <span>What happens after the free month?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-5\" role=\"region\" aria-labelledby=\"faq-q-5\">\n          <div class=\"faq-a-inner\">If you're happy with what you're seeing, we move to a simple monthly fee. [REPLACE WITH YOUR PRICE] No long lock-in, no surprises.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-6\" aria-expanded=\"false\" aria-controls=\"faq-a-6\">\n          <span>Am I tied into a long contract?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-6\" role=\"region\" aria-labelledby=\"faq-q-6\">\n          <div class=\"faq-a-inner\">No, we work month to month. We'd rather keep you because the results are good, not because a contract traps you.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-7\" aria-expanded=\"false\" aria-controls=\"faq-a-7\">\n          <span>What do you need from me to get started?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-7\" role=\"region\" aria-labelledby=\"faq-q-7\">\n          <div class=\"faq-a-inner\">Not much. A quick strategy call, access to your ad account (or we help you set one up), and a clear picture of what a good customer looks like for you. We handle the rest.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" id=\"faq-q-8\" aria-expanded=\"false\" aria-controls=\"faq-a-8\">\n          <span>How soon will I see results?<\u002Fspan>\n          <span class=\"faq-icon\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\" id=\"faq-a-8\" role=\"region\" aria-labelledby=\"faq-q-8\">\n          <div class=\"faq-a-inner\">Ads can start bringing in leads within the first week or two once everything is live. The first few days are setup and testing, then we scale what works.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================================================================== -->\n<!-- FOOTER                                                              -->\n<!-- =================================================================== -->\n<footer data-screen-label=\"05 Footer\">\n  <div class=\"tex\" aria-hidden=\"true\">\n    <img src=\"dfeb2ede-5892-499f-a5ab-02e09271ccdd\" style=\"top:-90%;left:72%;width:360px;opacity:.07;\">\n    <img src=\"dfeb2ede-5892-499f-a5ab-02e09271ccdd\" style=\"top:-30%;left:6%;width:200px;opacity:.065;\">\n  <\u002Fdiv>\n  <div class=\"container\">\n    <div class=\"footer-row\">\n      <a class=\"logo-link\" href=\"Landing%20Page.html\" aria-label=\"Panaroma — home\">\n        <div class=\"lockup\">\n          <div class=\"mark\">\n            <img src=\"dfeb2ede-5892-499f-a5ab-02e09271ccdd\" alt=\"\" aria-hidden=\"true\">\n          <\u002Fdiv>\n          <div class=\"lockup-text\">\n            <span class=\"wordmark\">Panaroma<\u002Fspan>\n            <span class=\"tag\">Automations<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <div>© 2025 Panaroma Automations. All rights reserved. &nbsp;·&nbsp; <a href=\"#\">Privacy<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- =================================================================== -->\n<!-- SCRIPTS                                                             -->\n<!-- =================================================================== -->\n<script>\n(function () {\n  // ------------------------------------------------------------------\n  // Procedurally build the halftone mark.\n  // Hex-packed grid; dot radius = function of distance from center.\n  // ------------------------------------------------------------------\n  const VB = 200;\n  const CX = VB / 2;\n  const CY = VB / 2;\n\n  const SPACING = 13;\n  const ROW_H   = SPACING * 0.866;\n  const MAX_DIST = 78;\n  const ROWS = 13;\n  const COLS = 13;\n\n  const dotSpecs = [];\n  for (let r = -ROWS; r <= ROWS; r++) {\n    const offset = (Math.abs(r) % 2 === 0) ? 0 : SPACING / 2;\n    for (let c = -COLS; c <= COLS; c++) {\n      const x = c * SPACING + offset;\n      const y = r * ROW_H;\n      const d = Math.hypot(x, y);\n      if (d > MAX_DIST + 4) continue;\n      let t = 1 - (d / MAX_DIST);\n      if (t < 0) t = 0;\n      const easedT = t * t * (3 - 2 * t);\n      const radius = 0.55 + easedT * 4.4;\n      dotSpecs.push({\n        x: CX + x,\n        y: CY + y,\n        r: radius,\n        d: d,\n      });\n    }\n  }\n\n  const SVG_NS = 'http://www.w3.org/2000/svg';\n\n  function fillFor(node) {\n    return node.getAttribute('data-halftone') === 'cream' ? '#FFF9E8' : '#1E1C1D';\n  }\n\n  function paint(node, opts) {\n    const isLoader = !!(opts && opts.loader);\n    const fill = isLoader ? '#FFF9E8' : fillFor(node);\n    dotSpecs.forEach((s) => {\n      const c = document.createElementNS(SVG_NS, 'circle');\n      c.setAttribute('cx', s.x.toFixed(2));\n      c.setAttribute('cy', s.y.toFixed(2));\n      c.setAttribute('r', s.r.toFixed(2));\n      c.setAttribute('fill', fill);\n      if (isLoader) {\n        // radial bounce wave — closer dots lead, outer dots follow\n        const bounceDelay = -((s.d / MAX_DIST) * 1.2).toFixed(3);\n        // per-dot pseudo-random flicker phase\n        const flickerSeed = ((s.x * 13.37 + s.y * 7.91) % 2.6 + 2.6) % 2.6;\n        c.style.animationDelay = bounceDelay + 's, -' + flickerSeed.toFixed(2) + 's';\n      }\n      node.appendChild(c);\n    });\n  }\n\n  paint(document.getElementById('loader-halftone'), { loader: true });\n  document.querySelectorAll('[data-halftone]').forEach((g) => paint(g, { loader: false }));\n\n  // ------------------------------------------------------------------\n  // Loader exit + hero reveal\n  // ------------------------------------------------------------------\n  const loader = document.getElementById('loader');\n  const LOADER_HOLD = 2200;\n  const LOADER_EXIT = 600;\n\n  function revealHero() {\n    document.querySelectorAll('.topbar .fade-up, .hero .fade-up').forEach((el) => {\n      const d = parseInt(el.dataset.delay || '0', 10);\n      setTimeout(() => el.classList.add('in'), d);\n    });\n  }\n\n  function exitLoader() {\n    if (!loader || loader.classList.contains('exit')) return;\n    loader.classList.add('exit');\n    setTimeout(() => loader.classList.add('gone'), 220);\n    setTimeout(revealHero, 280);\n    setTimeout(() => loader.remove(), LOADER_EXIT + 250);\n  }\n\n  window.addEventListener('load', () => {\n    setTimeout(exitLoader, LOADER_HOLD);\n  });\n  setTimeout(exitLoader, LOADER_HOLD + 1500);\n\n  // ------------------------------------------------------------------\n  // IntersectionObserver — fade-up on scroll\n  // ------------------------------------------------------------------\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach((entry) => {\n      if (entry.isIntersecting) {\n        entry.target.classList.add('in');\n        io.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.18, rootMargin: '0px 0px -40px 0px' });\n\n  document\n    .querySelectorAll('section:not(.hero) .fade-up, footer .fade-up')\n    .forEach((el, i) => {\n      // don't stamp a transition-delay on buttons — it would also delay\n      // their hover/click transforms and make them feel janky\n      if (!el.classList.contains('btn')) {\n        el.style.transitionDelay = ((i % 4) * 60) + 'ms';\n      }\n      io.observe(el);\n    });\n\n  // ------------------------------------------------------------------\n  // Button click ripple\n  // ------------------------------------------------------------------\n  document.querySelectorAll('.btn').forEach((btn) => {\n    btn.addEventListener('pointerdown', (e) => {\n      const rect = btn.getBoundingClientRect();\n      const size = Math.max(rect.width, rect.height);\n      const ripple = document.createElement('span');\n      ripple.className = 'ripple';\n      ripple.style.width = ripple.style.height = size + 'px';\n      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';\n      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';\n      ripple.addEventListener('animationend', () => ripple.remove());\n      btn.appendChild(ripple);\n    });\n  });\n\n  // ------------------------------------------------------------------\n  // FAQ accordion — independent toggles, smooth height animation\n  // ------------------------------------------------------------------\n  const faqButtons = Array.from(document.querySelectorAll('.faq-q'));\n  faqButtons.forEach((btn) => {\n    const panel = document.getElementById(btn.getAttribute('aria-controls'));\n    if (!panel) return;\n\n    btn.addEventListener('click', () => {\n      const open = btn.getAttribute('aria-expanded') === 'true';\n      if (open) {\n        // collapse: set explicit height first so transition has a start value\n        panel.style.height = panel.scrollHeight + 'px';\n        requestAnimationFrame(() => { panel.style.height = '0px'; });\n        btn.setAttribute('aria-expanded', 'false');\n      } else {\n        panel.style.height = panel.scrollHeight + 'px';\n        btn.setAttribute('aria-expanded', 'true');\n        // settle to auto once expanded so reflow/resize stays correct\n        panel.addEventListener('transitionend', function done(e) {\n          if (e.propertyName !== 'height') return;\n          if (btn.getAttribute('aria-expanded') === 'true') panel.style.height = 'auto';\n          panel.removeEventListener('transitionend', done);\n        });\n      }\n    });\n  });\n\n  // keep open panels correctly sized on resize\n  let faqResizeRAF;\n  window.addEventListener('resize', () => {\n    cancelAnimationFrame(faqResizeRAF);\n    faqResizeRAF = requestAnimationFrame(() => {\n      faqButtons.forEach((btn) => {\n        if (btn.getAttribute('aria-expanded') !== 'true') return;\n        const panel = document.getElementById(btn.getAttribute('aria-controls'));\n        if (panel) panel.style.height = 'auto';\n      });\n    });\n  });\n})
